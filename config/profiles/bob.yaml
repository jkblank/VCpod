profile: bob
device:
  match_by: volume_label
  match_value: "BOBS_IPOD"

playlists:
  - name: "Commute"
    source: ytmusic
    source_id: "PLxxxxxxxxxxxxxxxxxxxx"

podcasts:
  pocketcasts:
    credentials_file: /config/secrets/pocketcasts/bob.json
  sync_unplayed_only: false
  max_episodes_per_show: 3
  shows:
    - "11111111-1111-1111-1111-111111111111"
    - "22222222-2222-2222-2222-222222222222"
  # Per-show episode selection order, keyed by the same podcast UUIDs as
  # `shows`. Not listed = "newest" (always grab the latest unheard
  # episode). "next" grabs the oldest unheard episode first instead —
  # for a show meant to be listened to in chronological order (a
  # serialized story, a course) rather than "whatever's newest."
  fill_modes:
    "11111111-1111-1111-1111-111111111111": next

sync:
  trigger: manual
  transcode_format: mp3
  push_play_status_back: false

# Optional: sync a subset of a personal library that lives outside
# music-stack's own managed library/ folder. "exclude" mode is a
# blacklist — everything under "path" gets synced EXCEPT what's listed
# here (whole library minus a couple of artists), the mirror of alice's
# "include" example.
# external_library:
#   path: /home/bob/Music/MusicLibrary
#   mode: exclude
#   selections:
#     - "Nickelback"
#     - "Creed"
