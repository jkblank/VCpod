profile: alice
device:
  match_by: serial
  match_value: "AA11BB22"

playlists:
  - name: "Workout Mix"
    source: apple_music
    source_id: "pl.u-abc123"
    # sync_mode defaults to "absolute": the local .m3u8 always mirrors
    # this playlist's current contents exactly, including removals.
  - name: "Chill"
    source: spotify
    source_id: "37i9dQZF1DX000000000"
    # "additive": tracks are only ever added locally, never removed, even
    # if this playlist later drops them — for platform-curated playlists
    # that rotate/shrink their contents to stay a fixed length.
    sync_mode: additive

podcasts:
  pocketcasts:
    credentials_file: /config/secrets/pocketcasts/alice.json
  sync_unplayed_only: true
  max_episodes_per_show: 5
  shows: all

sync:
  trigger: on_connect
  transcode_format: alac
  push_play_status_back: true

# Optional: sync a subset of a personal library that lives outside
# music-stack's own managed library/ folder. "include" mode (default) is
# a whitelist — only what's listed here gets synced. "path" and its
# selections are matched artist/album/track by directory prefix.
# external_library:
#   path: /home/alice/Music/MusicLibrary
#   mode: include
#   selections:
#     - "Linkin Park"
#     - "Fleetwood Mac/Rumours"
#     - "Talking Heads":
#         - "Performance"
#         - "Remixed"
#     - "David Bowie/Hunky Dory/05 Life on Mars_.m4a"
